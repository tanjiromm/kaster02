<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaster_02 - الكون التفاعلي</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #7289da;
            --bg-color: #0a0e29;
            --text-color: white;
            --container-bg: rgba(255, 255, 255, 0.1);
            --container-border: rgba(255, 255, 255, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --device-type: 'mobile';
        }

        [data-theme="light"] {
            --bg-color: #87CEEB;
            --text-color: #2c3e50;
            --container-bg: rgba(255, 255, 255, 0.9);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-device="desktop"] {
            --container-bg: rgba(255, 255, 255, 0.15);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.8s ease;
        }

        /* جهاز المؤشر */
        .device-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 25px;
            padding: 8px 15px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px var(--shadow-color);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثيرات الجوال فقط */
        [data-device="mobile"] .stars {
            animation: twinkleMobile 3s infinite;
        }

        [data-device="mobile"] .planet {
            animation: planetMobile 6s infinite ease-in-out;
        }

        [data-device="mobile"] .profile-container {
            animation: floatMobile 5s infinite ease-in-out;
        }

        @keyframes twinkleMobile {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes planetMobile {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        @keyframes floatMobile {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
        }

        /* تأثيرات الديسكتوب فقط */
        [data-device="desktop"] {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        [data-device="desktop"] .profile-container {
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        [data-device="desktop"] .profile-container:hover {
            transform: translate(-50%, -50%) rotateY(5deg) rotateX(5deg);
        }

        [data-device="desktop"] .stars {
            animation: twinkleDesktop 2s infinite alternate;
        }

        [data-device="desktop"] .planet {
            animation: planetDesktop 8s infinite linear;
            transform-style: preserve-3d;
        }

        [data-device="desktop"] .planet:hover {
            animation-play-state: paused;
            transform: scale(1.5);
        }

        @keyframes twinkleDesktop {
            0% { opacity: 0.3; filter: blur(0.5px); }
            100% { opacity: 1; filter: blur(0); }
        }

        @keyframes planetDesktop {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(360deg); }
        }

        /* تأثير الماوس للديسكتوب - إعصار 🌪️ */
        .mouse-follower {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s, transform 0.2s;
        }

        [data-device="desktop"] .mouse-follower {
            opacity: 0.5;
        }

        .mouse-trail {
            position: fixed;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, transparent 30%, rgba(114, 137, 218, 0.3) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0;
            transform-origin: center;
        }

        .tornado-effect {
            position: fixed;
            width: 100px;
            height: 150px;
            background: linear-gradient(to top, transparent, rgba(114, 137, 218, 0.2));
            border-radius: 50% 50% 0 0;
            pointer-events: none;
            z-index: 9997;
            opacity: 0;
            filter: blur(10px);
            transform-origin: bottom center;
        }

        /* تأثير قوس قزح عند النقر على الاسم 🌈 */
        .rainbow-text {
            background: linear-gradient(
                90deg,
                #ff0000, #ff9900, #ffff00, 
                #00ff00, #0099ff, #6600ff, 
                #ff00ff
            );
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow 3s linear infinite;
            text-shadow: none !important;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* تأثير ألعاب نارية عند الوصول 🎆 */
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9990;
            opacity: 0;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: fireworkLaunch 1.5s ease-out forwards;
        }

        .firework-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: fireworkExplode 1s ease-out forwards;
        }

        @keyframes fireworkLaunch {
            0% { 
                transform: translateY(100vh) scale(0.5); 
                opacity: 1; 
            }
            70% { 
                transform: translateY(var(--target-y)) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(var(--target-y)) scale(1); 
                opacity: 0; 
            }
        }

        @keyframes fireworkExplode {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translate(var(--particle-x), var(--particle-y)) scale(0); 
                opacity: 0; 
            }
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .profile-container {
                width: 95%;
                max-width: 95%;
                padding: 25px 20px;
                margin: 20px auto;
                margin-top: 60px !important;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .username {
                font-size: 1.6em;
            }

            .discord-tag {
                font-size: 1.1em;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }

            .theme-toggle {
                width: 45px;
                height: 45px;
            }

            .device-indicator {
                top: 80px;
                left: 20px;
                font-size: 0.8em;
                padding: 6px 12px;
            }
        }

        @media (min-width: 769px) {
            .profile-container {
                max-width: 500px;
                cursor: grab;
                margin-top: 0;
            }

            .profile-container:active {
                cursor: grabbing;
            }

            .avatar:hover {
                transform: scale(1.1) rotateY(10deg);
            }

            .social-icon:hover {
                transform: scale(1.2) translateY(-8px) rotateY(10deg);
            }
        }

        /* الساعة */
        .time-container {
            position: fixed !important;
            top: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            width: 140px;
            height: 45px;
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--container-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 99999 !important;
            box-shadow: 0 10px 25px var(--shadow-color);
            overflow: visible !important;
            transition: all 0.3s ease;
            padding: 0 15px;
        }

        .time-container:hover {
            transform: translateX(-50%) translateY(-3px) !important;
            box-shadow: 0 15px 30px var(--shadow-color);
        }

        .time-icon {
            color: white;
            font-size: 1em;
            animation: pulse 2s infinite;
        }

        .time-display {
            font-size: 1.8em !important;
            font-weight: 900;
            color: white !important;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            font-family: 'Arial Black', 'Impact', sans-serif;
            line-height: 1;
            white-space: nowrap;
            overflow: visible !important;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* القمر والشمس */
        .moon {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            z-index: 2;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] .moon {
            transform: translateY(150vh);
            opacity: 0;
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 15px;
            width: 20px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 50%;
        }

        .sun {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 80px;
            height: 80px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 60px #FFA500;
            z-index: 2;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(150vh);
            opacity: 0;
        }

        [data-theme="light"] .sun {
            transform: translateY(0);
            opacity: 1;
        }

        /* النجوم */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .stars {
            opacity: 0;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* النيازك */
        .meteor {
            position: absolute;
            background: linear-gradient(90deg, white, transparent);
            height: 2px;
            animation: meteorFall 2s linear infinite;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .meteor {
            opacity: 0;
        }

        @keyframes meteorFall {
            0% { 
                transform: translateX(-100px) translateY(-100px) rotate(45deg);
                opacity: 1;
                width: 0;
            }
            100% { 
                transform: translateX(500px) translateY(500px) rotate(45deg);
                opacity: 0;
                width: 150px;
            }
        }

        /* الغيوم */
        .cloud {
            position: absolute;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .cloud {
            opacity: 1;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.8),
                inset 0 0 20px rgba(255, 255, 255, 0.9);
        }

        .cloud-1::before {
            width: 120px;
            height: 60px;
            top: 0;
            left: 0;
            filter: blur(8px);
        }

        .cloud-1::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            width: 80px;
            height: 50px;
            border-radius: 50%;
            top: -20px;
            left: 20px;
            filter: blur(6px);
        }

        .cloud-2::before {
            width: 180px;
            height: 70px;
            top: 0;
            left: 0;
            filter: blur(10px);
        }

        .cloud-2::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            width: 100px;
            height: 60px;
            border-radius: 50%;
            top: -25px;
            left: 40px;
            filter: blur(8px);
        }

        .cloud-3::before {
            width: 150px;
            height: 65px;
            top: 0;
            left: 0;
            filter: blur(9px);
        }

        .cloud-3::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            width: 90px;
            height: 55px;
            border-radius: 50%;
            top: -22px;
            left: 30px;
            filter: blur(7px);
        }

        @keyframes cloudMove {
            0% { transform: translateX(-200px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(1500px); opacity: 0; }
        }

        /* الكواكب */
        .planet {
            position: absolute;
            border-radius: 50%;
            animation: planetGlow 4s ease-in-out infinite;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.8s ease;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .planet:hover {
            transform: scale(1.2);
        }

        .planet.exploding {
            animation: planetExplode 0.8s ease-out forwards;
        }

        [data-theme="light"] .planet {
            opacity: 0;
        }

        @keyframes planetGlow {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes planetExplode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* البروفايل */
        .profile-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 450px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 35px;
            border: 2px solid var(--container-border);
            box-shadow: 0 25px 50px var(--shadow-color);
            text-align: center;
            animation: containerGlow 3s ease-in-out infinite;
            transition: all 0.8s ease;
            overflow: hidden;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 0px rgba(114, 137, 218, 0.5); }
            50% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 30px rgba(114, 137, 218, 0.8); }
        }

        .avatar-section {
            margin-bottom: 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 35px rgba(114, 137, 218, 0.6);
            margin: 0 auto 20px auto;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            object-fit: cover;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(114, 137, 218, 0.8);
        }

        .info-section {
            margin-bottom: 25px;
        }

        .username {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .username:hover {
            text-shadow: 0 0 25px rgba(114, 137, 218, 1);
            transform: scale(1.05);
        }

        .discord-tag {
            color: var(--primary-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .discord-tag:hover {
            color: #8ba0ff;
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.7);
            transform: scale(1.05);
        }

        .location {
            color: var(--text-color);
            font-size: 1.1em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            opacity: 0.9;
        }

        .age {
            color: var(--text-color);
            font-size: 1em;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .bio {
            color: var(--text-color);
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        .bio-main {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .social-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.2em;
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .youtube { background: rgba(255, 0, 0, 0.3) !important; }
        .instagram { background: rgba(225, 48, 108, 0.3) !important; }
        .snapchat { background: rgba(255, 252, 0, 0.3) !important; }
        .twitter { background: rgba(29, 161, 242, 0.3) !important; }
        .tiktok { background: rgba(0, 0, 0, 0.3) !important; }
        .discord { background: rgba(114, 137, 218, 0.3) !important; }
        .spotify { background: rgba(30, 215, 96, 0.3) !important; }
        .email { background: rgba(66, 133, 244, 0.3) !important; }
        .fortnite-gg { background: rgba(255, 165, 0, 0.3) !important; }
        .fortnite { background: rgba(148, 51, 255, 0.3) !important; }

        .fortnite img {
            width: 50% !important;
            height: 50% !important;
            object-fit: contain;
        }

        .star-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }

        .falling-star {
            position: absolute;
            background: linear-gradient(45deg, transparent, white, transparent);
            width: 3px;
            height: 20px;
            border-radius: 50%;
            animation: starFall 1s linear forwards;
        }

        @keyframes starFall {
            0% { 
                transform: translateY(-100px) rotate(45deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.2em;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .explosion-particles {
            position: absolute;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translate(var(--tx), var(--ty)) scale(0); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body data-theme="dark" data-device="mobile">
    <!-- مؤشر الجهاز -->
    <div class="device-indicator" id="deviceIndicator">
        <span id="deviceIcon">📱</span>
        <span id="deviceName">جوال</span>
    </div>
    
    <!-- تابع الماوس للديسكتوب -->
    <div class="mouse-follower" id="mouseFollower"></div>
    
    <!-- حاوية ألعاب نارية 🎆 -->
    <div class="fireworks-container" id="fireworksContainer"></div>
    
    <!-- الساعة -->
    <div class="time-container" id="timeContainer">
        <i class="fas fa-clock time-icon"></i>
        <div class="time-display" id="currentTime">00:00</div>
    </div>
    
    <!-- من الكود الأول -->
    <div class="stars" id="starsContainer"></div>
    <div class="moon"></div>
    <div class="sun"></div>
    <div id="meteorsContainer"></div>
    <div id="cloudsContainer"></div>
    <div id="planetsContainer"></div>
    
    <div class="star-rain" id="starRain"></div>
    
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>
    
    <div class="profile-container" id="profileContainer">
        <div class="avatar-section">
            <div class="avatar" onclick="openDiscord()">
                <img src="Tanjiro.jpg" alt="Tanjiro" class="avatar-img">
            </div>
        </div>

            <div class="username" id="username" onclick="rainbowEffect()">Kaster_02</div>

    <script>
        // 📱 اكتشاف نوع الجهاز
        function detectDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isTablet = /iPad|Android(?!.*Mobile)|Tablet|Silk/i.test(navigator.userAgent);
            
            if (isMobile || window.innerWidth <= 768) {
                return 'mobile';
            } else if (isTablet) {
                return 'tablet';
            } else {
                return 'desktop';
            }
        }

        // 🎮 تطبيق إعدادات الجهاز
        function applyDeviceSettings() {
            const deviceType = detectDevice();
            const body = document.body;
            const deviceIcon = document.getElementById('deviceIcon');
            const deviceName = document.getElementById('deviceName');
            
            // تعيين سمة الجهاز
            body.setAttribute('data-device', deviceType);
            
            // تحديث المؤشر
            if (deviceType === 'mobile') {
                deviceIcon.textContent = '📱';
                deviceName.textContent = 'جوال';
            } else if (deviceType === 'tablet') {
                deviceIcon.textContent = '📟';
                deviceName.textContent = 'تابلت';
            } else {
                deviceIcon.textContent = '💻';
                deviceName.textContent = 'كمبيوتر';
            }
            
            // تطبيق الإعدادات الخاصة
            if (deviceType === 'desktop') {
                initDesktopFeatures();
            } else {
                initMobileFeatures();
            }
            
            console.log(`📱 الجهاز المكتشف: ${deviceType}`);
            console.log(`🖥️ عرض الشاشة: ${window.innerWidth}px`);
        }

        // 🌪️ تأثير الإعصار عند تمرير الماوس (للديسكتوب فقط)
        function initDesktopFeatures() {
            const mouseFollower = document.getElementById('mouseFollower');
            let lastX = 0, lastY = 0;
            let velocityX = 0, velocityY = 0;
            let tornadoActive = false;
            let tornadoElement = null;
            let trailElements = [];
            
            document.addEventListener('mousemove', (e) => {
                // تحديث موقع تابع الماوس
                mouseFollower.style.left = e.clientX + 'px';
                mouseFollower.style.top = e.clientY + 'px';
                
                // حساب السرعة
                velocityX = e.clientX - lastX;
                velocityY = e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                
                // تأثير الإعصار عند السرعة العالية
                const speed = Math.sqrt(velocityX * velocityX + velocityY * velocityY);
                
                if (speed > 30 && !tornadoActive) {
                    createTornado(e.clientX, e.clientY);
                    tornadoActive = true;
                    
                    setTimeout(() => {
                        if (tornadoElement) {
                            tornadoElement.style.opacity = '0';
                            setTimeout(() => {
                                if (tornadoElement.parentNode) {
                                    tornadoElement.remove();
                                }
                            }, 500);
                        }
                        tornadoActive = false;
                    }, 800);
                }
                
                // تأثير الذيل
                createTrail(e.clientX, e.clientY, speed);
                
                // تنظيف الذيل القديم
                setTimeout(() => {
                    if (trailElements.length > 0) {
                        const oldTrail = trailElements.shift();
                        oldTrail.style.opacity = '0';
                        setTimeout(() => {
                            if (oldTrail.parentNode) {
                                oldTrail.remove();
                            }
                        }, 300);
                    }
                }, 500);
            });
            
            function createTornado(x, y) {
                tornadoElement = document.createElement('div');
                tornadoElement.className = 'tornado-effect';
                tornadoElement.style.left = (x - 50) + 'px';
                tornadoElement.style.top = (y - 150) + 'px';
                tornadoElement.style.opacity = '0.7';
                tornadoElement.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(tornadoElement);
                
                // تأثير صوتي للإعصار
                playSound('https://assets.mixkit.co/sfx/preview/mixkit-wind-swoosh-1495.mp3', 0.1);
                
                // ازدياد حجم الإعصار
                setTimeout(() => {
                    if (tornadoElement) {
                        tornadoElement.style.transform = `scale(1.5) rotate(${Math.random() * 720}deg)`;
                    }
                }, 400);
            }
            
            function createTrail(x, y, speed) {
                const trail = document.createElement('div');
                trail.className = 'mouse-trail';
                trail.style.left = (x - 15) + 'px';
                trail.style.top = (y - 15) + 'px';
                trail.style.opacity = '0.3';
                trail.style.transform = `scale(${Math.min(speed / 50, 2)})`;
                
                document.body.appendChild(trail);
                trailElements.push(trail);
            }
            
            // تأثيرات ثلاثية الأبعاد للبروفايل
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.addEventListener('mousemove', (e) => {
                const xAxis = (e.offsetY / profileContainer.offsetHeight - 0.5) * 10;
                const yAxis = (e.offsetX / profileContainer.offsetWidth - 0.5) * -10;
                profileContainer.style.transform = `translate(-50%, -50%) perspective(1000px) rotateX(${xAxis}deg) rotateY(${yAxis}deg)`;
            });
            
            profileContainer.addEventListener('mouseleave', () => {
                profileContainer.style.transform = 'translate(-50%, -50%)';
            });
            
            // إمكانية السحب
            let isDragging = false;
            let startX, startY, initialX, initialY;
            
            profileContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = profileContainer.offsetLeft;
                initialY = profileContainer.offsetTop;
                profileContainer.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                profileContainer.style.left = `calc(50% + ${dx}px)`;
                profileContainer.style.top = `calc(50% + ${dy}px)`;
                profileContainer.style.transform = 'translate(-50%, -50%)';
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
                profileContainer.style.cursor = 'grab';
                
                // العودة للمركز بعد ثانية
                setTimeout(() => {
                    profileContainer.style.left = '50%';
                    profileContainer.style.top = '50%';
                }, 1000);
            });
        }

        // 📱 مميزات الموبايل
        function initMobileFeatures() {
            // تأثيرات اللمس
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.addEventListener('touchstart', () => {
                profileContainer.style.transform = 'translate(-50%, -50%) scale(0.98)';
            });
            
            profileContainer.addEventListener('touchend', () => {
                profileContainer.style.transform = 'translate(-50%, -50%) scale(1)';
            });
        }

        // 🌈 تأثير قوس قزح عند النقر على الاسم
        function rainbowEffect() {
            const username = document.getElementById('username');
            const originalClass = username.className;
            
            // إضافة كلاس قوس قزح
            username.classList.add('rainbow-text');
            
            // صوت سحري
            playSound('https://assets.mixkit.co/sfx/preview/mixkit-magic-sparkles-300.mp3', 0.4);
            
            // تفعيل ألعاب نارية صغيرة
            createSmallFireworks(username.getBoundingClientRect());
            
            // إزالة التأثير بعد 3 ثواني
            setTimeout(() => {
                username.classList.remove('rainbow-text');
                username.className = originalClass;
            }, 3000);
        }

        // 🎆 ألعاب نارية عند الوصول للصفحة
        function createWelcomeFireworks() {
            const fireworksContainer = document.getElementById('fireworksContainer');
            fireworksContainer.style.opacity = '1';
            
            // 5 ألعاب نارية
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * window.innerWidth * 0.8 + window.innerWidth * 0.1,
                        Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2,
                        colors[i % colors.length]
                    );
                }, i * 500);
            }
            
            // إخفاء الحاوية بعد الانتهاء
            setTimeout(() => {
                fireworksContainer.style.opacity = '0';
                setTimeout(() => {
                    fireworksContainer.innerHTML = '';
                }, 1000);
            }, 3500);
            
            // صوت ألعاب نارية
            playSound('https://assets.mixkit.co/sfx/preview/mixkit-explosion-firework-muzzle-2772.mp3', 0.2);
        }

        // 🎆 إنشاء لعبة نارية واحدة
        function createFirework(x, y, color) {
            const fireworksContainer = document.getElementById('fireworksContainer');
            
            // الصاروخ
            const firework = document.createElement('div');
            firework.className = 'firework';
            firework.style.left = x + 'px';
            firework.style.bottom = '0px';
            firework.style.background = color;
            firework.style.setProperty('--target-y', (window.innerHeight - y) + 'px');
            
            fireworksContainer.appendChild(firework);
            
            // الانفجار بعد وصول الصاروخ
            setTimeout(() => {
                createFireworkExplosion(x, y, color);
                firework.remove();
            }, 700);
        }

        // 💥 انفجار لعبة نارية
        function createFireworkExplosion(x, y, color) {
            const fireworksContainer = document.getElementById('fireworksContainer');
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 50 + Math.random() * 100;
                const particleX = Math.cos(angle) * distance;
                const particleY = Math.sin(angle) * distance;
                
                particle.style.setProperty('--particle-x', particleX + 'px');
                particle.style.setProperty('--particle-y', particleY + 'px');
                
                fireworksContainer.appendChild(particle);
                
                // إزالة الجسيمات بعد الانتهاء
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 🎆 ألعاب نارية صغيرة حول العنصر
        function createSmallFireworks(rect) {
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            const colors = ['#ff6b6b', '#4ecdc4', '#feca57', '#ff9ff3'];
            
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const angle = (i * 45) * Math.PI / 180;
                    const distance = 50;
                    const fx = x + Math.cos(angle) * distance;
                    const fy = y + Math.sin(angle) * distance;
                    
                    createMiniFirework(fx, fy, colors[i % colors.length]);
                }, i * 100);
            }
        }

        function createMiniFirework(x, y, color) {
            const fireworksContainer = document.getElementById('fireworksContainer');
            
            const particle = document.createElement('div');
            particle.className = 'firework-particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.background = color;
            particle.style.width = '3px';
            particle.style.height = '3px';
            particle.style.animationDuration = '0.5s';
            
            const angle = Math.random() * Math.PI * 2;
            const distance = 20 + Math.random() * 30;
            const particleX = Math.cos(angle) * distance;
            const particleY = Math.sin(angle) * distance;
            
            particle.style.setProperty('--particle-x', particleX + 'px');
            particle.style.setProperty('--particle-y', particleY + 'px');
            
            fireworksContainer.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 500);
        }

        // باقي الكود يبقى كما هو...
        // 🔊 الأصوات الناعمة للكواكب فقط
        const planetSounds = [
            'https://assets.mixkit.co/sfx/preview/mixkit-bubble-pop-up-1938.mp3',
            'https://assets.mixkit.co/sfx/preview/mixkit-mouse-click-1006.mp3',
            'https://assets.mixkit.co/sfx/preview/mixkit-cute-magical-spell-1920.mp3',
            'https://assets.mixkit.co/sfx/preview/mixkit-cartoon-toy-whistle-400.mp3',
            'https://assets.mixkit.co/sfx/preview/mixkit-cool-interface-click-tone-2568.mp3',
            'https://assets.mixkit.co/sfx/preview/mixkit-magic-sparkles-300.mp3'
        ];

        // 🔊 الأصوات العامة
        const soundEffects = {
            click: 'https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3',
            toggle: 'https://assets.mixkit.co/sfx/preview/mixkit-light-switch-click-1161.mp3'
        };

        // 🔊 دالة تشغيل الصوت الناعم للكواكب
        function playPlanetSound() {
            try {
                const randomSound = planetSounds[Math.floor(Math.random() * planetSounds.length)];
                const audio = new Audio(randomSound);
                audio.volume = 0.3;
                audio.play().catch(e => console.log('لم يتم تشغيل الصوت:', e));
            } catch (error) {
                console.log('خطأ في تشغيل الصوت:', error);
            }
        }

        // 🔊 دالة تشغيل الصوت العام
        function playSound(soundUrl, volume = 0.3) {
            try {
                const audio = new Audio(soundUrl);
                audio.volume = volume;
                audio.play().catch(e => console.log('لم يتم تشغيل الصوت:', e));
            } catch (error) {
                console.log('خطأ في تشغيل الصوت:', error);
            }
        }

        // 🌟 إنشاء النجوم
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = detectDevice() === 'desktop' ? 400 : 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const size = Math.random() * (detectDevice() === 'desktop' ? 4 : 2) + 1;
                const delay = Math.random() * 5;
                
                star.style.left = left + '%';
                star.style.top = top + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = delay + 's';
                
                starsContainer.appendChild(star);
            }
        }

        // ☄️ إنشاء النيازك
        function createMeteors() {
            const meteorsContainer = document.getElementById('meteorsContainer');
            const meteorCount = detectDevice() === 'desktop' ? 8 : 5;
            
            for (let i = 0; i < meteorCount; i++) {
                const meteor = document.createElement('div');
                meteor.classList.add('meteor');
                
                const top = Math.random() * 50;
                const delay = Math.random() * 15;
                const duration = Math.random() * 3 + 2;
                
                meteor.style.top = top + '%';
                meteor.style.animationDelay = delay + 's';
                meteor.style.animationDuration = duration + 's';
                
                meteorsContainer.appendChild(meteor);
            }
        }

        // ☁️ إنشاء الغيوم
        function createClouds() {
            const cloudsContainer = document.getElementById('cloudsContainer');
            const cloudCount = detectDevice() === 'desktop' ? 8 : 5;
            
            for (let i = 0; i < cloudCount; i++) {
                const cloud = document.createElement('div');
                cloud.classList.add('cloud');
                
                const cloudType = `cloud-${Math.floor(Math.random() * 3) + 1}`;
                cloud.classList.add(cloudType);
                
                const top = Math.random() * 60 + 10;
                const delay = Math.random() * 30;
                const duration = Math.random() * 40 + 30;
                
                cloud.style.top = top + '%';
                cloud.style.animation = `cloudMove ${duration}s linear ${delay}s infinite`;
                
                cloudsContainer.appendChild(cloud);
            }
        }

        // 🪐 إنشاء الكواكب مع الأصوات الناعمة
        function createPlanets() {
            const planetsContainer = document.getElementById('planetsContainer');
            const planetColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3'];
            const planetCount = detectDevice() === 'desktop' ? 8 : 4;
            
            for (let i = 0; i < planetCount; i++) {
                const planet = document.createElement('div');
                planet.classList.add('planet');
                
                const left = Math.random() * 80 + 10;
                const top = Math.random() * 60 + 20;
                const size = detectDevice() === 'desktop' ? 
                    (Math.random() * 40 + 30) : 
                    (Math.random() * 25 + 15);
                const color = planetColors[i % planetColors.length];
                const delay = Math.random() * 3;
                
                planet.style.left = left + '%';
                planet.style.top = top + '%';
                planet.style.width = size + 'px';
                planet.style.height = size + 'px';
                planet.style.background = color;
                planet.style.animationDelay = delay + 's';
                planet.style.boxShadow = `0 0 30px ${color}`;
                
                if (detectDevice() === 'desktop') {
                    planet.style.boxShadow = `0 0 50px ${color}, inset 0 0 20px rgba(255,255,255,0.2)`;
                }
                
                planet.addEventListener('click', function(e) {
                    if (this.classList.contains('exploding')) return;
                    
                    playPlanetSound();
                    
                    this.classList.add('exploding');
                    createExplosionParticles(e.clientX, e.clientY, this.style.background);
                    
                    setTimeout(() => {
                        this.classList.remove('exploding');
                        this.style.opacity = '1';
                        this.style.transform = 'scale(1)';
                    }, 3000);
                });
                
                planetsContainer.appendChild(planet);
            }
        }

        // 💥 إنشاء جزيئات الانفجار
        function createExplosionParticles(x, y, color) {
            const particlesContainer = document.createElement('div');
            particlesContainer.className = 'explosion-particles';
            document.body.appendChild(particlesContainer);
            
            const particleCount = detectDevice() === 'desktop' ? 30 : 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = color;
                particle.style.width = (Math.random() * 10 + 5) + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
            
            setTimeout(() => {
                particlesContainer.remove();
            }, 1500);
        }

        // ⭐ تأثير المطر النجمي
        function createStarRain(event) {
            const starRain = document.getElementById('starRain');
            const rect = event.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            
            const count = detectDevice() === 'desktop' ? 20 : 10;
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = (x + Math.random() * 100 - 50) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                starRain.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            starRain.style.opacity = '1';
            setTimeout(() => {
                starRain.style.opacity = '0';
            }, 1000);
        }

        // 🔊 إضافة أصوات النقر
        function addClickSounds() {
            const clickableElements = document.querySelectorAll('a, button, .avatar, .discord-tag, .social-icon');
            
            clickableElements.forEach(element => {
                element.addEventListener('click', () => {
                    playSound(soundEffects.click, 0.2);
                });
            });
            
            document.getElementById('themeToggle').addEventListener('click', () => {
                playSound(soundEffects.toggle, 0.3);
            });
        }

        // ⏰ تحديث الساعة
        function updateTime() {
            const now = new Date();
            const options = { 
                timeZone: 'Asia/Riyadh',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            };
            
            const timeString = now.toLocaleTimeString('en-US', options);
            document.getElementById('currentTime').textContent = timeString;
            setTimeout(updateTime, 60000);
        }

        // 🔄 نظام الدارك/وايت مود
        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = themeToggle.querySelector('i');
            const body = document.body;
            
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!prefersDark) {
                body.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
            }
            
            themeToggle.addEventListener('click', () => {
                const isDark = body.getAttribute('data-theme') === 'dark';
                body.setAttribute('data-theme', isDark ? 'light' : 'dark');
                themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                playToggleSound();
            });
        }

        // 🔊 صوت تبديل الثيم
        function playToggleSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 🎂 حساب العمر
        function calculateAge() {
            const birthDate = new Date(2005, 2, 26);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        function updateAge() {
            const age = calculateAge();
            document.querySelector('.age').textContent = `العمر: ${age} سنة`;
        }
