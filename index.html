<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaster_02 - الكون التفاعلي</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #7289da;
            --bg-color: #0a0e29;
            --text-color: white;
            --container-bg: rgba(255, 255, 255, 0.1);
            --container-border: rgba(255, 255, 255, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --device-type: 'mobile'; /* سيتم تغييره بالجافاسكريبت */
        }

        [data-device="desktop"] {
            --container-bg: rgba(255, 255, 255, 0.15);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.8s ease;
        }

        /* جهاز المؤشر */
        .device-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 25px;
            padding: 8px 15px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px var(--shadow-color);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثيرات الجوال فقط */
        [data-device="mobile"] .stars {
            animation: twinkleMobile 3s infinite;
        }

        [data-device="mobile"] .planet {
            animation: planetMobile 6s infinite ease-in-out;
        }

        [data-device="mobile"] .profile-container {
            animation: floatMobile 5s infinite ease-in-out;
        }

        @keyframes twinkleMobile {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes planetMobile {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        @keyframes floatMobile {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
        }

        /* تأثيرات الديسكتوب فقط */
        [data-device="desktop"] {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        [data-device="desktop"] .profile-container {
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }

        [data-device="desktop"] .profile-container:hover {
            transform: translate(-50%, -50%) rotateY(5deg) rotateX(5deg);
        }

        [data-device="desktop"] .stars {
            animation: twinkleDesktop 2s infinite alternate;
        }

        [data-device="desktop"] .planet {
            animation: planetDesktop 8s infinite linear;
            transform-style: preserve-3d;
        }

        [data-device="desktop"] .planet:hover {
            animation-play-state: paused;
            transform: scale(1.5);
        }

        @keyframes twinkleDesktop {
            0% { opacity: 0.3; filter: blur(0.5px); }
            100% { opacity: 1; filter: blur(0); }
        }

        @keyframes planetDesktop {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(360deg) rotateX(360deg); }
        }

        /* تأثير الماوس للديسكتوب */
        .mouse-follower {
            position: fixed;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        [data-device="desktop"] .mouse-follower {
            opacity: 0.5;
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .profile-container {
                width: 95%;
                max-width: 95%;
                padding: 25px 20px;
                margin: 20px auto;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .username {
                font-size: 1.6em;
            }

            .discord-tag {
                font-size: 1.1em;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }

            .moon, .sun {
                width: 50px;
                height: 50px;
                top: 5%;
                right: 5%;
            }

            .theme-toggle {
                width: 45px;
                height: 45px;
            }

            .time-container {
                width: 120px;
                height: 35px;
                top: -17px;
            }

            .time-display {
                font-size: 1.4em !important;
            }

            .time-icon {
                font-size: 0.8em;
            }

            .device-indicator {
                top: 80px;
                left: 20px;
                font-size: 0.8em;
                padding: 6px 12px;
            }
        }

        @media (min-width: 769px) {
            .profile-container {
                max-width: 500px;
                cursor: grab;
            }

            .profile-container:active {
                cursor: grabbing;
            }

            .avatar:hover {
                transform: scale(1.1) rotateY(10deg);
            }

            .social-icon:hover {
                transform: scale(1.2) translateY(-8px) rotateY(10deg);
            }
        }

        /* الساعة */
        .time-container {
            position: absolute;
            top: -19px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 40px;
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--container-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 101;
            box-shadow: 0 8px 20px var(--shadow-color);
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 0 10px;
        }

        .time-container:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-color);
        }

        .time-icon {
            color: var(--primary-color);
            font-size: 0.9em;
            animation: pulse 2s infinite;
        }

        .time-display {
            font-size: 1.8em !important;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 10px rgba(114, 137, 218, 0.5);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* النجوم */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
        }

        /* الكواكب */
        .planet {
            position: absolute;
            border-radius: 50%;
            z-index: 2;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .planet.exploding {
            animation: planetExplode 0.8s ease-out forwards;
        }

        @keyframes planetExplode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }

        .profile-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 450px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 35px;
            border: 2px solid var(--container-border);
            box-shadow: 0 25px 50px var(--shadow-color);
            text-align: center;
            animation: containerGlow 3s ease-in-out infinite;
            transition: all 0.8s ease;
            overflow: hidden;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 0px rgba(114, 137, 218, 0.5); }
            50% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 30px rgba(114, 137, 218, 0.8); }
        }

        .avatar-section {
            margin-bottom: 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 35px rgba(114, 137, 218, 0.6);
            margin: 0 auto 20px auto;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            object-fit: cover;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(114, 137, 218, 0.8);
        }

        .info-section {
            margin-bottom: 25px;
        }

        .username {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .username:hover {
            text-shadow: 0 0 25px rgba(114, 137, 218, 1);
            transform: scale(1.05);
        }

        .discord-tag {
            color: var(--primary-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .discord-tag:hover {
            color: #8ba0ff;
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.7);
            transform: scale(1.05);
        }

        .location {
            color: var(--text-color);
            font-size: 1.1em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            opacity: 0.9;
        }

        .age {
            color: var(--text-color);
            font-size: 1em;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .bio {
            color: var(--text-color);
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        .bio-main {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .social-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.2em;
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .youtube { background: rgba(255, 0, 0, 0.3) !important; }
        .instagram { background: rgba(225, 48, 108, 0.3) !important; }
        .snapchat { background: rgba(255, 252, 0, 0.3) !important; }
        .twitter { background: rgba(29, 161, 242, 0.3) !important; }
        .tiktok { background: rgba(0, 0, 0, 0.3) !important; }
        .discord { background: rgba(114, 137, 218, 0.3) !important; }
        .spotify { background: rgba(30, 215, 96, 0.3) !important; }
        .email { background: rgba(66, 133, 244, 0.3) !important; }
        .fortnite-gg { background: rgba(255, 165, 0, 0.3) !important; }
        .fortnite { background: rgba(148, 51, 255, 0.3) !important; }

        .fortnite img {
            width: 50% !important;
            height: 50% !important;
            object-fit: contain;
        }

        .star-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }

        .falling-star {
            position: absolute;
            background: linear-gradient(45deg, transparent, white, transparent);
            width: 3px;
            height: 20px;
            border-radius: 50%;
            animation: starFall 1s linear forwards;
        }

        @keyframes starFall {
            0% { 
                transform: translateY(-100px) rotate(45deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.2em;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .explosion-particles {
            position: absolute;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes particleFloat {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translate(var(--tx), var(--ty)) scale(0); 
                opacity: 0; 
            }
        }
    </style>
</head>

    <script>
        // 📱 اكتشاف نوع الجهاز
        function detectDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isTablet = /iPad|Android(?!.*Mobile)|Tablet|Silk/i.test(navigator.userAgent);
            
            if (isMobile || window.innerWidth <= 768) {
                return 'mobile';
            } else if (isTablet) {
                return 'tablet';
            } else {
                return 'desktop';
            }
        }

        // 🎮 تطبيق إعدادات الجهاز
        function applyDeviceSettings() {
            const deviceType = detectDevice();
            const body = document.body;
            const deviceIcon = document.getElementById('deviceIcon');
            const deviceName = document.getElementById('deviceName');
            
            // تعيين سمة الجهاز
            body.setAttribute('data-device', deviceType);
            
            // تحديث المؤشر
            if (deviceType === 'mobile') {
                deviceIcon.textContent = '📱';
                deviceName.textContent = 'جوال';
            } else if (deviceType === 'tablet') {
                deviceIcon.textContent = '📟';
                deviceName.textContent = 'تابلت';
            } else {
                deviceIcon.textContent = '💻';
                deviceName.textContent = 'كمبيوتر';
            }
            
            // تطبيق الإعدادات الخاصة
            if (deviceType === 'desktop') {
                initDesktopFeatures();
            } else {
                initMobileFeatures();
            }
            
            console.log(`📱 الجهاز المكتشف: ${deviceType}`);
            console.log(`🖥️ عرض الشاشة: ${window.innerWidth}px`);
        }

        // 💻 مميزات الديسكتوب
        function initDesktopFeatures() {
            // تابع الماوس
            const mouseFollower = document.getElementById('mouseFollower');
            
            document.addEventListener('mousemove', (e) => {
                mouseFollower.style.left = e.clientX + 'px';
                mouseFollower.style.top = e.clientY + 'px';
            });
            
            // تأثيرات ثلاثية الأبعاد
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.addEventListener('mousemove', (e) => {
                const xAxis = (e.offsetY / profileContainer.offsetHeight - 0.5) * 10;
                const yAxis = (e.offsetX / profileContainer.offsetWidth - 0.5) * -10;
                profileContainer.style.transform = `translate(-50%, -50%) perspective(1000px) rotateX(${xAxis}deg) rotateY(${yAxis}deg)`;
            });
            
            profileContainer.addEventListener('mouseleave', () => {
                profileContainer.style.transform = 'translate(-50%, -50%)';
            });
            
            // إمكانية السحب
            let isDragging = false;
            let startX, startY, initialX, initialY;
            
            profileContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = profileContainer.offsetLeft;
                initialY = profileContainer.offsetTop;
                profileContainer.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                
                profileContainer.style.left = `calc(50% + ${dx}px)`;
                profileContainer.style.top = `calc(50% + ${dy}px)`;
                profileContainer.style.transform = 'translate(-50%, -50%)';
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
                profileContainer.style.cursor = 'grab';
                
                // العودة للمركز بعد ثانية
                setTimeout(() => {
                    profileContainer.style.left = '50%';
                    profileContainer.style.top = '50%';
                }, 1000);
            });
            
            // أزرار لوحة المفاتيح
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ') { // مسافة
                    createStarExplosion();
                }
            });
        }

        // 📱 مميزات الموبايل
        function initMobileFeatures() {
            // تأثيرات اللمس
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.addEventListener('touchstart', () => {
                profileContainer.style.transform = 'translate(-50%, -50%) scale(0.98)';
            });
            
            profileContainer.addEventListener('touchend', () => {
                profileContainer.style.transform = 'translate(-50%, -50%) scale(1)';
            });
            
            // التمرير السريع
            let touchStartY = 0;
            let touchEndY = 0;
            
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.changedTouches[0].screenY;
            });
            
            document.addEventListener('touchend', (e) => {
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe(touchStartY, touchEndY);
            });
            
            function handleSwipe(startY, endY) {
                const swipeDistance = Math.abs(endY - startY);
                
                if (swipeDistance > 50) {
                    if (endY < startY) {
                        // تمرير لأعلى
                        createStarRainAtCenter();
                    }
                }
            }
            
            // هز الجهاز
            if (typeof DeviceMotionEvent !== 'undefined') {
                let lastShake = 0;
                
                window.addEventListener('devicemotion', (e) => {
                    const acceleration = e.accelerationIncludingGravity;
                    const magnitude = Math.sqrt(
                        acceleration.x * acceleration.x +
                        acceleration.y * acceleration.y +
                        acceleration.z * acceleration.z
                    );
                    
                    if (magnitude > 15) {
                        const now = Date.now();
                        if (now - lastShake > 1000) {
                            lastShake = now;
                            shakeEffect();
                        }
                    }
                });
            }
        }

        // ⭐ إنشاء نجمة في المركز (للموبايل)
        function createStarRainAtCenter() {
            const starRain = document.getElementById('starRain');
            const centerX = window.innerWidth / 2;
            
            for (let i = 0; i < 10; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = (centerX + Math.random() * 100 - 50) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                starRain.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            starRain.style.opacity = '1';
            setTimeout(() => {
                starRain.style.opacity = '0';
            }, 1000);
        }

        // 📱 تأثير الهز (للموبايل)
        function shakeEffect() {
            const profileContainer = document.getElementById('profileContainer');
            
            profileContainer.style.animation = 'none';
            setTimeout(() => {
                profileContainer.style.animation = 'floatMobile 5s infinite ease-in-out, shake 0.5s ease-in-out';
                setTimeout(() => {
                    profileContainer.style.animation = 'floatMobile 5s infinite ease-in-out';
                }, 500);
            }, 10);
            
            // إضافة أنماط الاهتزاز
            const style = document.createElement('style');
            style.textContent = `
                @keyframes shake {
                    0%, 100% { transform: translate(-50%, -50%); }
                    25% { transform: translate(calc(-50% + 10px), -50%); }
                    50% { transform: translate(-50%, calc(-50% + 10px)); }
                    75% { transform: translate(calc(-50% - 10px), -50%); }
                }
            `;
            document.head.appendChild(style);
            
            // تفجير نجمة
            createStarExplosion();
        }

        // 💥 انفجار النجوم (للديسكتوب)
        function createStarExplosion() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            for (let i = 0; i < 20; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = centerX + 'px';
                star.style.top = centerY + 'px';
                star.style.animation = `explodeStar 1s ease-out forwards ${i * 0.05}s`;
                
                document.body.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            // إضافة أنماط الانفجار
            const style = document.createElement('style');
            style.textContent = `
                @keyframes explodeStar {
                    0% { 
                        transform: translate(0, 0) scale(0); 
                        opacity: 1; 
                    }
                    100% { 
                        transform: translate(var(--ex, 0), var(--ey, 0)) scale(1); 
                        opacity: 0; 
                    }
                }
            `;
            document.head.appendChild(style);
            
            // تعيين اتجاهات عشوائية للانفجار
            document.querySelectorAll('.falling-star').forEach((star, i) => {
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 200;
                const ex = Math.cos(angle) * distance;
                const ey = Math.sin(angle) * distance;
                star.style.setProperty('--ex', ex + 'px');
                star.style.setProperty('--ey', ey + 'px');
            });
        }

        // باقي الكود يبقى كما هو مع بعض التعديلات
        const soundEffects = {
            planet: [
                'https://assets.mixkit.co/sfx/preview/mixkit-bubble-pop-up-alert-notification-2357.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3'
            ],
            click: 'https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3',
            toggle: 'https://assets.mixkit.co/sfx/preview/mixkit-light-switch-click-1161.mp3'
        };

        function playSound(soundUrl, volume = 0.3) {
            try {
                const audio = new Audio(soundUrl);
                audio.volume = volume;
                audio.play().catch(e => console.log('لم يتم تشغيل الصوت:', e));
            } catch (error) {
                console.log('خطأ في تشغيل الصوت:', error);
            }
        }

        function updateTime() {
            const now = new Date();
            const options = { 
                timeZone: 'Asia/Riyadh',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            };
            
            const timeString = now.toLocaleTimeString('en-US', options);
            document.getElementById('currentTime').textContent = timeString;
            setTimeout(updateTime, 60000);
        }

        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = detectDevice() === 'desktop' ? 400 : 200;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const size = Math.random() * (detectDevice() === 'desktop' ? 4 : 2) + 1;
                const delay = Math.random() * 5;
                
                star.style.left = left + '%';
                star.style.top = top + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = delay + 's';
                
                starsContainer.appendChild(star);
            }
        }

        function createPlanets() {
            const planetsContainer = document.getElementById('planetsContainer');
            const planetColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3'];
            const planetCount = detectDevice() === 'desktop' ? 8 : 4;
            
            for (let i = 0; i < planetCount; i++) {
                const planet = document.createElement('div');
                planet.classList.add('planet');
                
                const left = Math.random() * 80 + 10;
                const top = Math.random() * 60 + 20;
                const size = detectDevice() === 'desktop' ? 
                    (Math.random() * 40 + 30) : 
                    (Math.random() * 25 + 15);
                const color = planetColors[i % planetColors.length];
                const delay = Math.random() * 3;
                
                planet.style.left = left + '%';
                planet.style.top = top + '%';
                planet.style.width = size + 'px';
                planet.style.height = size + 'px';
                planet.style.background = color;
                planet.style.animationDelay = delay + 's';
                planet.style.boxShadow = `0 0 30px ${color}`;
                
                // تأثيرات خاصة بالديسكتوب
                if (detectDevice() === 'desktop') {
                    planet.style.boxShadow = `0 0 50px ${color}, inset 0 0 20px rgba(255,255,255,0.2)`;
                }
                
                planet.addEventListener('click', function(e) {
                    if (this.classList.contains('exploding')) return;
                    
                    const randomSound = soundEffects.planet[Math.floor(Math.random() * soundEffects.planet.length)];
                    playSound(randomSound, 0.4);
                    
                    this.classList.add('exploding');
                    createExplosionParticles(e.clientX, e.clientY, this.style.background);
                    
                    setTimeout(() => {
                        this.classList.remove('exploding');
                        this.style.opacity = '1';
                        this.style.transform = 'scale(1)';
                    }, 3000);
                });
                
                planetsContainer.appendChild(planet);
            }
        }

        function createExplosionParticles(x, y, color) {
            const particlesContainer = document.createElement('div');
            particlesContainer.className = 'explosion-particles';
            document.body.appendChild(particlesContainer);
            
            const particleCount = detectDevice() === 'desktop' ? 30 : 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = color;
                particle.style.width = (Math.random() * 10 + 5) + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
            
            setTimeout(() => {
                particlesContainer.remove();
            }, 1500);
        }

        function createStarRain(event) {
            const starRain = document.getElementById('starRain');
            const rect = event.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            
            const count = detectDevice() === 'desktop' ? 20 : 10;
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = (x + Math.random() * 100 - 50) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                starRain.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            starRain.style.opacity = '1';
            setTimeout(() => {
                starRain.style.opacity = '0';
            }, 1000);
        }

        function calculateAge() {
            const birthDate = new Date(2005, 2, 26);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        function updateAge() {
            const age = calculateAge();
            document.querySelector('.age').textContent = `العمر: ${age} سنة`;
        }

        function openDiscord() {
            window.open('https://discord.com/users/860948173827997719', '_blank');
        }

        window.onload = function() {
            applyDeviceSettings(); // اكتشاف الجهاز أولاً
            createStars();
            createPlanets();
            updateAge();
            updateTime();
            
            // إضافة إعادة تحميل عند تغيير الحجم
            window.addEventListener('resize', applyDeviceSettings);
            
            console.log('🚀 الكون التفاعلي جاهز!');
            console.log('📱 تجربة مختلفة للجوال والكمبيوتر');
        };
    </script>
</body>
</html>
