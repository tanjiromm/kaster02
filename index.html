<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaster_02 - عالم الطعام</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #FF6B6B;
            --bg-color: linear-gradient(to bottom, #FFF5E1, #FFE8C8);
            --text-color: #5D4037;
            --container-bg: rgba(255, 255, 255, 0.9);
            --container-border: rgba(255, 182, 193, 0.3);
            --shadow-color: rgba(251, 192, 147, 0.4);
            --time-color: #FF5722;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: all 0.8s ease;
        }

        /* مؤشر الثيم */
        .theme-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 25px;
            padding: 8px 15px;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px var(--shadow-color);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* عناصر الطعام العائمة */
        .food-item {
            position: absolute;
            font-size: 2em;
            z-index: 1;
            animation: floatFood 15s infinite ease-in-out;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .food-item:hover {
            transform: scale(1.2) rotate(15deg);
        }

        @keyframes floatFood {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(20px) rotate(-5deg); }
        }

        /* بخار الطبخ */
        .steam {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: steamRise 4s infinite ease-out;
            z-index: 2;
        }

        @keyframes steamRise {
            0% { 
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            50% { 
                opacity: 0.8;
            }
            100% { 
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .profile-container {
                width: 95%;
                max-width: 95%;
                padding: 25px 20px;
                margin: 20px auto;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .username {
                font-size: 1.6em;
            }

            .discord-tag {
                font-size: 1.1em;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }

            .theme-toggle {
                width: 45px;
                height: 45px;
            }

            .time-container {
                width: 120px;
                height: 35px;
                top: -17px;
            }

            .time-display {
                font-size: 1.4em !important;
            }

            .time-icon {
                font-size: 0.8em;
            }

            .theme-indicator {
                top: 80px;
                left: 20px;
                font-size: 0.8em;
                padding: 6px 12px;
            }

            .food-item {
                font-size: 1.5em;
            }
        }

        @media (max-width: 480px) {
            .profile-container {
                padding: 20px 15px;
                border-radius: 20px;
                margin-top: 25px;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .username {
                font-size: 1.4em;
            }

            .discord-tag {
                font-size: 1em;
            }

            .location, .age, .bio {
                font-size: 0.9em;
            }

            .social-section {
                gap: 8px;
            }

            .social-icon {
                width: 38px;
                height: 38px;
            }

            .time-container {
                width: 110px;
                height: 32px;
                top: -16px;
            }

            .time-display {
                font-size: 1.3em !important;
            }

            .time-icon {
                font-size: 0.7em;
            }

            .theme-indicator {
                top: 70px;
                left: 15px;
                font-size: 0.75em;
            }

            .food-item {
                font-size: 1.2em;
            }
        }

        /* الساعة */
        .time-container {
            position: absolute;
            top: -19px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 40px;
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--container-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 101;
            box-shadow: 0 8px 20px var(--shadow-color);
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 0 10px;
        }

        .time-container:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-color);
        }

        .time-icon {
            color: var(--primary-color);
            font-size: 0.9em;
            animation: pulse 2s infinite;
        }

        .time-display {
            font-size: 1.8em !important;
            font-weight: 800;
            color: var(--time-color);
            text-shadow: 0 0 10px rgba(255, 87, 34, 0.3);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        /* فقاعات الطهي */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            animation: bubbleFloat 8s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes bubbleFloat {
            0% { 
                transform: translateY(0) scale(0.3);
                opacity: 0;
            }
            50% { 
                opacity: 0.7;
            }
            100% { 
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* كعكة عيد الميلاد */
        .cake {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 3em;
            z-index: 5;
            animation: cakeGlow 3s infinite alternate;
            cursor: pointer;
        }

        @keyframes cakeGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .profile-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 450px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 35px;
            border: 2px solid var(--container-border);
            box-shadow: 0 25px 50px var(--shadow-color);
            text-align: center;
            animation: containerGlow 3s ease-in-out infinite;
            transition: all 0.8s ease;
            overflow: hidden;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #FF6B6B, #FFD166, #06D6A0, #118AB2);
            z-index: 1;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 25px 50px var(--shadow-color); }
            50% { box-shadow: 0 25px 50px rgba(255, 107, 107, 0.6); }
        }

        .avatar-section {
            margin-bottom: 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 35px rgba(255, 107, 107, 0.6);
            margin: 0 auto 20px auto;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #FFE8C8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            object-fit: cover;
            position: relative;
        }

        .avatar::after {
            content: '🍽️';
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 2em;
            z-index: 2;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px var(--primary-color);
        }

        .info-section {
            margin-bottom: 25px;
        }

        .username {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .username:hover {
            text-shadow: 0 0 25px rgba(255, 107, 107, 0.5);
            transform: scale(1.05);
        }

        .discord-tag {
            color: var(--primary-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .discord-tag:hover {
            color: #FF8E8E;
            text-shadow: 0 0 15px rgba(255, 107, 107, 0.7);
            transform: scale(1.05);
        }

        .location {
            color: var(--text-color);
            font-size: 1.1em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            opacity: 0.9;
        }

        .age {
            color: var(--text-color);
            font-size: 1em;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .bio {
            color: var(--text-color);
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        .bio-main {
            font-weight: bold;
            margin-bottom: 5px;
            color: #FF5722;
        }

        .social-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 107, 107, 0.3);
            font-size: 1.2em;
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 107, 107, 0.2);
            box-shadow: 0 10px 25px var(--shadow-color);
        }

        /* ألوان الأيقونات حسب نوع الطعام */
        .youtube { background: rgba(255, 0, 0, 0.2) !important; border-color: rgba(255, 0, 0, 0.3) !important; }
        .instagram { background: rgba(225, 48, 108, 0.2) !important; border-color: rgba(225, 48, 108, 0.3) !important; }
        .snapchat { background: rgba(255, 252, 0, 0.2) !important; border-color: rgba(255, 252, 0, 0.3) !important; }
        .twitter { background: rgba(29, 161, 242, 0.2) !important; border-color: rgba(29, 161, 242, 0.3) !important; }
        .tiktok { background: rgba(0, 0, 0, 0.2) !important; border-color: rgba(0, 0, 0, 0.3) !important; }
        .discord { background: rgba(114, 137, 218, 0.2) !important; border-color: rgba(114, 137, 218, 0.3) !important; }
        .spotify { background: rgba(30, 215, 96, 0.2) !important; border-color: rgba(30, 215, 96, 0.3) !important; }
        .email { background: rgba(66, 133, 244, 0.2) !important; border-color: rgba(66, 133, 244, 0.3) !important; }
        .fortnite-gg { background: rgba(255, 165, 0, 0.2) !important; border-color: rgba(255, 165, 0, 0.3) !important; }
        .fortnite { background: rgba(148, 51, 255, 0.2) !important; border-color: rgba(148, 51, 255, 0.3) !important; }

        .fortnite img {
            width: 50% !important;
            height: 50% !important;
            object-fit: contain;
        }

        .star-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }

        .falling-star {
            position: absolute;
            background: linear-gradient(45deg, transparent, #FF6B6B, transparent);
            width: 3px;
            height: 20px;
            border-radius: 50%;
            animation: starFall 1s linear forwards;
        }

        @keyframes starFall {
            0% { 
                transform: translateY(-100px) rotate(45deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.2em;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        /* تأثير القلي */
        .sizzle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700;
            border-radius: 50%;
            animation: sizzlePop 0.5s ease-out forwards;
            z-index: 3;
        }

        @keyframes sizzlePop {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* طاهي صغير */
        .chef {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 3em;
            z-index: 5;
            animation: chefWave 5s infinite;
            cursor: pointer;
        }

        @keyframes chefWave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <!-- مؤشر الثيم -->
    <div class="theme-indicator" id="themeIndicator">
        <span id="themeIcon">🍕</span>
        <span id="themeName">عالم الطعام</span>
    </div>
    
    <!-- عناصر الطعام العائمة -->
    <div id="foodContainer"></div>
    
    <!-- بخار الطبخ -->
    <div id="steamContainer"></div>
    
    <!-- فقاعات الطبخ -->
    <div id="bubblesContainer"></div>
    
    <!-- طاهي -->
    <div class="chef" id="chef">👨‍🍳</div>
    
    <!-- كعكة -->
    <div class="cake" id="cake">🎂</div>
    
    <div class="star-rain" id="starRain"></div>
    
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-utensils"></i>
    </div>
    
    <div class="profile-container">
        <!-- الساعة -->
        <div class="time-container" id="timeContainer">
            <i class="fas fa-clock time-icon"></i>
            <div class="time-display" id="currentTime">00:00</div>
        </div>
        
        <div class="avatar-section">
            <div class="avatar" onclick="openDiscord()">
                <img src="Tanjiro.jpg" alt="Tanjiro" class="avatar-img">

        </div>
        
        <div class="info-section">
            <div class="username" onclick="openDiscord()">Kaster_02</div>
            <div class="discord-tag" onclick="openDiscord()">@Kaster_02</div>
            <div class="location">🇸🇦 السعودية 📍</div>
            <div class="age">العمر: 20 سنة</div>
            <div class="bio">
                <div class="bio-main">مطور و مصمم مواقع ✨ | 🍕 عاشق للطعام</div>
            </div>
        </div>
        
        <div class="social-section">
            <a href="https://www.youtube.com/@kaster_02I" target="_blank" class="social-icon youtube" onclick="createFoodRain(event)">
                <i class="fab fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/kaster_02/" target="_blank" class="social-icon instagram" onclick="createFoodRain(event)">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.snapchat.com/@kaster_02" target="_blank" class="social-icon snapchat" onclick="createFoodRain(event)">
                <i class="fab fa-snapchat"></i>
            </a>
            <a href="https://x.com/kaster_02" target="_blank" class="social-icon twitter" onclick="createFoodRain(event)">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="https://www.tiktok.com/@kaster_02" target="_blank" class="social-icon tiktok" onclick="createFoodRain(event)">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="https://open.spotify.com/playlist/53SjuiCGYO52gdRffERzSq" target="_blank" class="social-icon spotify" onclick="createFoodRain(event)">
                <i class="fab fa-spotify"></i>
            </a>
            <a href="mailto:gogjdu887@gmail.com" class="social-icon email" onclick="createFoodRain(event)">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="#" onclick="openDiscord(); createFoodRain(event)" class="social-icon discord">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://fortnite.gg/creator?name=tnv" target="_blank" class="social-icon fortnite-gg" onclick="createFoodRain(event)">
                <i class="fas fa-smile"></i>
            </a>
            <a href="https://www.fortnite.com/@tnv?lang=ar" target="_blank" class="social-icon fortnite" onclick="createFoodRain(event)">
                <img src="https://static-assets-prod.epicgames.com/fortnite/static/favicon.ico" alt="Fortnite">
            </a>
        </div>
    </div>

    <script>
        // ⚡ الأصوات الجديدة للطعام
        const foodSounds = {
            sizzle: 'https://assets.mixkit.co/sfx/preview/mixkit-cooking-oil-sizzle-887.mp3',
            chop: 'https://assets.mixkit.co/sfx/preview/mixkit-knife-cutting-vegetables-2450.mp3',
            pour: 'https://assets.mixkit.co/sfx/preview/mixkit-pouring-water-into-a-glass-433.mp3',
            bite: 'https://assets.mixkit.co/sfx/preview/mixkit-biting-into-a-crisp-apple-1999.mp3',
            microwave: 'https://assets.mixkit.co/sfx/preview/mixkit-microwave-oven-beep-1094.mp3',
            toast: 'https://assets.mixkit.co/sfx/preview/mixkit-toaster-ding-1030.mp3'
        };

        // 🍽️ أنواع الطعام المختلفة
        const foodItems = [
            '🍕', '🍔', '🌭', '🍟', '🌮', '🌯', '🥗', '🍣', '🍜', '🍛',
            '🍚', '🍙', '🍘', '🍥', '🥟', '🍤', '🍦', '🍧', '🍨', '🎂',
            '🍮', '🍩', '🍪', '🧁', '🍫', '🍬', '🍭', '🍿', '🥨', '🥐',
            '🥯', '🍞', '🥖', '🧀', '🥚', '🍳', '🧈', '🥞', '🧇', '🥓',
            '🥩', '🍗', '🍖', '🦴', '🌭', '🍔', '🍟', '🍕', '🥪', '🥙'
        ];

        // 🍳 أنواع الطبخ
        const cookingStyles = [
            { name: "إيطالي", icon: "🍕", color: "#FF6B6B" },
            { name: "ياباني", icon: "🍣", color: "#FF8E8E" },
            { name: "مكسيكي", icon: "🌮", color: "#FFB347" },
            { name: "حلويات", icon: "🎂", color: "#FFD166" },
            { name: "وجبات سريعة", icon: "🍔", color: "#06D6A0" }
        ];

        // 🔊 دالة تشغيل الصوت
        function playSound(soundUrl, volume = 0.3) {
            try {
                const audio = new Audio(soundUrl);
                audio.volume = volume;
                audio.play().catch(e => console.log('لم يتم تشغيل الصوت:', e));
            } catch (error) {
                console.log('خطأ في تشغيل الصوت:', error);
            }
        }

        // 🍕 إنشاء طعام عائم
        function createFloatingFood() {
            const container = document.getElementById('foodContainer');
            
            for (let i = 0; i < 20; i++) {
                const food = document.createElement('div');
                food.className = 'food-item';
                food.textContent = foodItems[Math.floor(Math.random() * foodItems.length)];
                
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const delay = Math.random() * 20;
                const duration = 15 + Math.random() * 10;
                
                food.style.left = left + '%';
                food.style.top = top + '%';
                food.style.animationDelay = delay + 's';
                food.style.animationDuration = duration + 's';
                food.style.fontSize = (1 + Math.random() * 1.5) + 'em';
                
                food.addEventListener('click', function() {
                    playSound(foodSounds.bite, 0.2);
                    createSizzleEffect(left, top);
                    this.style.transform = 'scale(0) rotate(360deg)';
                    setTimeout(() => {
                        this.remove();
                        setTimeout(createFloatingFood, 1000);
                    }, 300);
                });
                
                container.appendChild(food);
            }
        }

        // 🔥 تأثير القلي
        function createSizzleEffect(x, y) {
            const sizzle = document.createElement('div');
            sizzle.className = 'sizzle';
            sizzle.style.left = x + '%';
            sizzle.style.top = y + '%';
            document.body.appendChild(sizzle);
            
            playSound(foodSounds.sizzle, 0.2);
            
            setTimeout(() => {
                sizzle.remove();
            }, 500);
        }

        // ☁️ إنشاء بخار الطبخ
        function createSteam() {
            const container = document.getElementById('steamContainer');
            
            setInterval(() => {
                const steam = document.createElement('div');
                steam.className = 'steam';
                
                const left = Math.random() * 100;
                const size = 20 + Math.random() * 40;
                const delay = Math.random() * 2;
                
                steam.style.left = left + '%';
                steam.style.bottom = '0';
                steam.style.width = size + 'px';
                steam.style.height = size + 'px';
                steam.style.animationDelay = delay + 's';
                
                container.appendChild(steam);
                
                setTimeout(() => {
                    steam.remove();
                }, 4000);
            }, 800);
        }

        // 💧 إنشاء فقاعات الطبخ
        function createBubbles() {
            const container = document.getElementById('bubblesContainer');
            
            setInterval(() => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const left = Math.random() * 100;
                const size = 10 + Math.random() * 30;
                const delay = Math.random() * 3;
                
                bubble.style.left = left + '%';
                bubble.style.bottom = '0';
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.animationDelay = delay + 's';
                
                container.appendChild(bubble);
                
                setTimeout(() => {
                    bubble.remove();
                }, 8000);
            }, 500);
        }

        // 🌟 مطر الطعام عند النقر
        function createFoodRain(event) {
            const starRain = document.getElementById('starRain');
            const rect = event.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            
            for (let i = 0; i < 15; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = (x + Math.random() * 100 - 50) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                starRain.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            starRain.style.opacity = '1';
            setTimeout(() => {
                starRain.style.opacity = '0';
            }, 1000);
            
            playSound(foodSounds.chop, 0.2);
        }

        // 👨‍🍳 تفاعل مع الطاهي
        function initChefInteraction() {
            const chef = document.getElementById('chef');
            
            chef.addEventListener('click', function() {
                playSound(foodSounds.toast, 0.3);
                
                // تغيير تعبير الطاهي
                const expressions = ['👨‍🍳', '😋', '👨‍🍳', '😎', '👨‍🍳', '🔥'];
                let i = 0;
                
                const interval = setInterval(() => {
                    chef.textContent = expressions[i];
                    i++;
                    if (i >= expressions.length) {
                        clearInterval(interval);
                        chef.textContent = '👨‍🍳';
                    }
                }, 200);
                
                // إطلاق شرارة من الطاهي
                createSizzleEffect(10, 90);
            });
        }

        // 🎂 تفاعل مع الكعكة
        function initCakeInteraction() {
            const cake = document.getElementById('cake');
            
            cake.addEventListener('click', function() {
                playSound(foodSounds.microwave, 0.3);
                
                // تأثير توهج الكعكة
                cake.style.animation = 'cakeGlow 0.3s infinite alternate';
                
                // إضافة شموع
                for(let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createSizzleEffect(
                            90 + Math.random() * 5,
                            80 + Math.random() * 5
                        );
                    }, i * 200);
                }
                
                setTimeout(() => {
                    cake.style.animation = 'cakeGlow 3s infinite alternate';
                }, 2000);
            });
        }

        // ⏰ دالة تحديث الساعة
        function updateTime() {
            const now = new Date();
            
            // توقيت الرياض (توقيت السعودية)
            const options = { 
                timeZone: 'Asia/Riyadh',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            };
            
            const timeString = now.toLocaleTimeString('en-US', options);
            document.getElementById('currentTime').textContent = timeString;
            
            // تحديث كل دقيقة
            setTimeout(updateTime, 60000);
        }

        // 🔊 إضافة أصوات للنقر على الروابط
        function addClickSounds() {
            const clickableElements = document.querySelectorAll('a, button, .avatar, .username, .discord-tag, .time-container');
            
            clickableElements.forEach(element => {
                element.addEventListener('click', () => {
                    playSound(foodSounds.pour, 0.2);
                });
            });
            
            // صوت خاص لتبديل الثيم
            document.getElementById('themeToggle').addEventListener('click', () => {
                playSound(foodSounds.microwave, 0.3);
                changeCookingStyle();
            });
        }

        // 🔄 تغيير أسلوب الطبخ
        function changeCookingStyle() {
            const style = cookingStyles[Math.floor(Math.random() * cookingStyles.length)];
            
            document.getElementById('themeIcon').textContent = style.icon;
            document.getElementById('themeName').textContent = style.name;
            
            // تغيير اللون الأساسي
            document.documentElement.style.setProperty('--primary-color', style.color);
            
            // إضافة تأثير
            createSizzleEffect(50, 50);
        }

        // 🎂 تحديث العمر
        function calculateAge() {
            const birthDate = new Date(2005, 2, 26);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        function updateAge() {
            const age = calculateAge();
            document.querySelector('.age').textContent = `العمر: ${age} سنة`;
        }

        function openDiscord() {
            window.open('https://discord.com/users/860948173827997719', '_blank');
        }

        window.onload = function() {
            updateAge();
            updateTime();
            createFloatingFood();
            createSteam();
            createBubbles();
            initChefInteraction();
            initCakeInteraction();
            addClickSounds();
            
            // تطبيق أسلوب طبخ عشوائي عند التحميل
            changeCookingStyle();
            
            console.log('🍕 عالم الطعام جاهز!');
            console.log('👨‍🍳 انقر على الطاهي والكعكة');
            console.log('🍽️ انقر على الأطعمة العائمة');
        };
    </script>
</body>
