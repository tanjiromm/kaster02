<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaster_02 - النجم</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary-color: #7289da;
            --bg-color: #0a0e29;
            --text-color: white;
            --container-bg: rgba(255, 255, 255, 0.1);
            --container-border: rgba(255, 255, 255, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-color: #87CEEB;
            --text-color: #2c3e50;
            --container-bg: rgba(255, 255, 255, 0.9);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: background 0.8s ease;
        }

        /* تحسينات للجوال */
        @media (max-width: 768px) {
            .profile-container {
                width: 95%;
                max-width: 95%;
                padding: 25px 20px;
                margin: 20px auto;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .username {
                font-size: 1.6em;
            }

            .discord-tag {
                font-size: 1.1em;
            }

            .social-icon {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }

            .moon, .sun {
                width: 50px;
                height: 50px;
                top: 5%;
                right: 5%;
            }

            .theme-toggle {
                width: 45px;
                height: 45px;
            }

            .time-container {
                width: 120px;
                height: 35px;
                top: -17px;
            }

            .time-display {
                font-size: 1.4em !important;
            }

            .time-icon {
                font-size: 0.8em;
            }
        }

        @media (max-width: 480px) {
            .profile-container {
                padding: 20px 15px;
                border-radius: 20px;
                margin-top: 25px;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .username {
                font-size: 1.4em;
            }

            .discord-tag {
                font-size: 1em;
            }

            .location, .age, .bio {
                font-size: 0.9em;
            }

            .social-section {
                gap: 8px;
            }

            .social-icon {
                width: 38px;
                height: 38px;
            }

            .moon, .sun {
                width: 40px;
                height: 40px;
            }

            .time-container {
                width: 110px;
                height: 32px;
                top: -16px;
            }

            .time-display {
                font-size: 1.3em !important;
            }

            .time-icon {
                font-size: 0.7em;
            }
        }

        /* تحسينات للأجهزة الكبيرة */
        @media (min-width: 1200px) {
            .profile-container {
                max-width: 500px;
            }

            .time-container {
                width: 130px;
                height: 38px;
                top: -19px;
            }

            .time-display {
                font-size: 1.6em !important;
            }
        }

        /* الساعة */
        .time-container {
            position: absolute;
            top: -19px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 40px;
            background: var(--container-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--container-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 101;
            box-shadow: 0 8px 20px var(--shadow-color);
            overflow: hidden;
            transition: all 0.3s ease;
            padding: 0 10px;
        }

        .time-container::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--container-border);
            z-index: 1;
        }

        .time-container:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-color);
        }

        .time-icon {
            color: var(--primary-color);
            font-size: 0.9em;
            animation: pulse 2s infinite;
        }

        .time-display {
            font-size: 1.8em !important;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* النجوم - تظهر فقط في Dark Mode */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .stars {
            opacity: 0;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .moon {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 80px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            z-index: 2;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] .moon {
            transform: translateY(150vh);
            opacity: 0;
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 15px;
            width: 20px;
            height: 20px;
            background: #e0e0e0;
            border-radius: 50%;
        }

        .sun {
            position: absolute;
            top: 10%;
            right: 10%;
            width: 80px;
            height: 80px;
            background: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 60px #FFA500;
            z-index: 2;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(150vh);
            opacity: 0;
        }

        [data-theme="light"] .sun {
            transform: translateY(0);
            opacity: 1;
        }

        .meteor {
            position: absolute;
            background: linear-gradient(90deg, white, transparent);
            height: 2px;
            animation: meteorFall 2s linear infinite;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .meteor {
            opacity: 0;
        }

        .cloud {
            position: absolute;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        [data-theme="light"] .cloud {
            opacity: 1;
        }

        .cloud::before {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.8),
                inset 0 0 20px rgba(255, 255, 255, 0.9);
        }

        .cloud-1::before {
            width: 120px;
            height: 60px;
            top: 0;
            left: 0;
            filter: blur(8px);
        }

        .cloud-1::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            width: 80px;
            height: 50px;
            border-radius: 50%;
            top: -20px;
            left: 20px;
            filter: blur(6px);
        }

        .cloud-2::before {
            width: 180px;
            height: 70px;
            top: 0;
            left: 0;
            filter: blur(10px);
        }

        .cloud-2::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            width: 100px;
            height: 60px;
            border-radius: 50%;
            top: -25px;
            left: 40px;
            filter: blur(8px);
        }

        .cloud-3::before {
            width: 150px;
            height: 65px;
            top: 0;
            left: 0;
            filter: blur(9px);
        }

        .cloud-3::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            width: 90px;
            height: 55px;
            border-radius: 50%;
            top: -22px;
            left: 30px;
            filter: blur(7px);
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            animation: planetGlow 4s ease-in-out infinite;
            z-index: 2;
            opacity: 1;
            transition: opacity 0.8s ease;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .planet:hover {
            transform: scale(1.2);
        }

        .planet.exploding {
            animation: planetExplode 0.8s ease-out forwards;
        }

        [data-theme="light"] .planet {
            opacity: 0;
        }

        .profile-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 450px;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 35px;
            border: 1px solid var(--container-border);
            box-shadow: 0 25px 50px var(--shadow-color);
            text-align: center;
            animation: containerGlow 3s ease-in-out infinite;
            transition: all 0.8s ease;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 0px rgba(114, 137, 218, 0.5); }
            50% { box-shadow: 0 25px 50px var(--shadow-color), 0 0 30px rgba(114, 137, 218, 0.8); }
        }

        .avatar-section {
            margin-bottom: 20px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 35px rgba(114, 137, 218, 0.6);
            margin: 0 auto 20px auto;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            object-fit: cover;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(114, 137, 218, 0.8);
        }

        .info-section {
            margin-bottom: 25px;
        }

        .username {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text-color);
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .username:hover {
            text-shadow: 0 0 25px rgba(114, 137, 218, 1);
            transform: scale(1.05);
        }

        .discord-tag {
            color: var(--primary-color);
            font-size: 1.3em;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .discord-tag:hover {
            color: #8ba0ff;
            text-shadow: 0 0 15px rgba(114, 137, 218, 0.7);
            transform: scale(1.05);
        }

        .location {
            color: var(--text-color);
            font-size: 1.1em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            opacity: 0.9;
        }

        .age {
            color: var(--text-color);
            font-size: 1em;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .bio {
            color: var(--text-color);
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
            opacity: 0.8;
        }

        .bio-main {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .social-section {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1.2em;
            color: var(--text-color);
            text-decoration: none;
            position: relative;
        }

        .social-icon::after {
            display: none !important;
        }

        .social-icon:hover {
            transform: scale(1.15) translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .youtube { background: rgba(255, 0, 0, 0.3) !important; }
        .instagram { background: rgba(225, 48, 108, 0.3) !important; }
        .snapchat { background: rgba(255, 252, 0, 0.3) !important; }
        .twitter { background: rgba(29, 161, 242, 0.3) !important; }
        .tiktok { background: rgba(0, 0, 0, 0.3) !important; }
        .discord { background: rgba(114, 137, 218, 0.3) !important; }
        .spotify { background: rgba(30, 215, 96, 0.3) !important; }
        .email { background: rgba(66, 133, 244, 0.3) !important; }
        .fortnite-gg { background: rgba(255, 165, 0, 0.3) !important; }
        .fortnite { background: rgba(148, 51, 255, 0.3) !important; }

        .fortnite img {
            width: 50% !important;
            height: 50% !important;
            object-fit: contain;
        }

        .star-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
        }

        .falling-star {
            position: absolute;
            background: linear-gradient(45deg, transparent, white, transparent);
            width: 3px;
            height: 20px;
            border-radius: 50%;
            animation: starFall 1s linear forwards;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--container-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--container-border);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.2em;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .explosion-particles {
            position: absolute;
            pointer-events: none;
            z-index: 3;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: particleFloat 1.5s ease-out forwards;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes meteorFall {
            0% { 
                transform: translateX(-100px) translateY(-100px) rotate(45deg);
                opacity: 1;
                width: 0;
            }
            100% { 
                transform: translateX(500px) translateY(500px) rotate(45deg);
                opacity: 0;
                width: 150px;
            }
        }

        @keyframes cloudMove {
            0% { transform: translateX(-200px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(1500px); opacity: 0; }
        }

        @keyframes planetGlow {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes starFall {
            0% { 
                transform: translateY(-100px) rotate(45deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(100vh) rotate(45deg);
                opacity: 0;
            }
        }

        @keyframes planetExplode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes particleFloat {
            0% { 
                transform: translate(0, 0) scale(1); 
                opacity: 1; 
            }
            100% { 
                transform: translate(var(--tx), var(--ty)) scale(0); 
                opacity: 0; 
            }
        }
    </style>
</head>

    <script>
        // ⚡ الأصوات الجديدة
        const soundEffects = {
            planet: [
                'https://assets.mixkit.co/sfx/preview/mixkit-bubble-pop-up-alert-notification-2357.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3',
                'https://assets.mixkit.co/sfx/preview/mixkit-unlock-game-notification-253.mp3'
            ],
            click: 'https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3',
            toggle: 'https://assets.mixkit.co/sfx/preview/mixkit-light-switch-click-1161.mp3'
        };

        // ⏰ دالة تحديث الساعة
        function updateTime() {
            const now = new Date();
            
            // توقيت الرياض (توقيت السعودية)
            const options = { 
                timeZone: 'Asia/Riyadh',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit'
            };
            
            const timeString = now.toLocaleTimeString('en-US', options);
            
            document.getElementById('currentTime').textContent = timeString;
            
            // تحديث كل دقيقة (60000 ميلي ثانية)
            setTimeout(updateTime, 60000);
        }

        // 🔊 دالة تشغيل الصوت
        function playSound(soundUrl, volume = 0.3) {
            try {
                const audio = new Audio(soundUrl);
                audio.volume = volume;
                audio.play().catch(e => console.log('لم يتم تشغيل الصوت:', e));
            } catch (error) {
                console.log('خطأ في تشغيل الصوت:', error);
            }
        }

        // 💥 تفجير الكواكب
        function initPlanetsInteraction() {
            const planets = document.querySelectorAll('.planet');
            
            planets.forEach(planet => {
                planet.style.cursor = 'pointer';
                
                planet.addEventListener('click', function(e) {
                    // منع النقر المتعدد
                    if (this.classList.contains('exploding')) return;
                    
                    // تشغيل صوت عشوائي
                    const randomSound = soundEffects.planet[Math.floor(Math.random() * soundEffects.planet.length)];
                    playSound(randomSound, 0.4);
                    
                    // تأثير الانفجار
                    this.classList.add('exploding');
                    
                    // إنشاء جزيئات الانفجار
                    createExplosionParticles(e.clientX, e.clientY, this.style.background);
                    
                    // إعادة إنشاء الكوكب بعد 3 ثواني
                    setTimeout(() => {
                        this.classList.remove('exploding');
                        this.style.opacity = '1';
                        this.style.transform = 'scale(1)';
                    }, 3000);
                });
            });
        }

        // ✨ إنشاء جزيئات الانفجار
        function createExplosionParticles(x, y, color) {
            const particlesContainer = document.createElement('div');
            particlesContainer.className = 'explosion-particles';
            document.body.appendChild(particlesContainer);
            
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = color;
                particle.style.width = (Math.random() * 10 + 5) + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                
                // اتجاهات عشوائية للجزيئات
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                particlesContainer.appendChild(particle);
                
                // إزالة الجزيء بعد الانتهاء
                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
            
            // إزالة الحاوية بعد الانتهاء
            setTimeout(() => {
                particlesContainer.remove();
            }, 1500);
        }

        // 🔊 إضافة أصوات للنقر على الروابط
        function addClickSounds() {
            const clickableElements = document.querySelectorAll('a, button, .avatar, .username, .discord-tag, .time-container');
            
            clickableElements.forEach(element => {
                element.addEventListener('click', () => {
                    playSound(soundEffects.click, 0.2);
                });
            });
            
            // صوت خاص لتبديل الثيم
            document.getElementById('themeToggle').addEventListener('click', () => {
                playSound(soundEffects.toggle, 0.3);
            });
        }

        // الدوال الأصلية تبقى كما هي مع بعض التحسينات
        function initTheme() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = themeToggle.querySelector('i');
            const body = document.body;
            
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (!prefersDark) {
                body.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
            }
            
            themeToggle.addEventListener('click', () => {
                const isDark = body.getAttribute('data-theme') === 'dark';
                body.setAttribute('data-theme', isDark ? 'light' : 'dark');
                themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                playToggleSound();
            });
        }

        function playToggleSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.3);
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        function createStarRain(event) {
            const starRain = document.getElementById('starRain');
            const rect = event.currentTarget.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            
            for (let i = 0; i < 15; i++) {
                const star = document.createElement('div');
                star.classList.add('falling-star');
                star.style.left = (x + Math.random() * 100 - 50) + 'px';
                star.style.animationDelay = (Math.random() * 0.5) + 's';
                starRain.appendChild(star);
                
                setTimeout(() => {
                    star.remove();
                }, 1000);
            }
            
            starRain.style.opacity = '1';
            setTimeout(() => {
                starRain.style.opacity = '0';
            }, 1000);
        }

        function calculateAge() {
            const birthDate = new Date(2005, 2, 26);
            const today = new Date();
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            return age;
        }

        function updateAge() {
            const age = calculateAge();
            document.querySelector('.age').textContent = `العمر: ${age} سنة`;
        }

        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            const starCount = 300;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const size = Math.random() * 3 + 1;
                const delay = Math.random() * 5;
                
                star.style.left = left + '%';
                star.style.top = top + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDelay = delay + 's';
                
                starsContainer.appendChild(star);
            }
        }

        function createMeteors() {
            const meteorsContainer = document.getElementById('meteorsContainer');
            const meteorCount = 8;
            
            for (let i = 0; i < meteorCount; i++) {
                const meteor = document.createElement('div');
                meteor.classList.add('meteor');
                
                const top = Math.random() * 50;
                const delay = Math.random() * 15;
                const duration = Math.random() * 3 + 2;
                
                meteor.style.top = top + '%';
                meteor.style.animationDelay = delay + 's';
                meteor.style.animationDuration = duration + 's';
                
                meteorsContainer.appendChild(meteor);
            }
        }

        function createClouds() {
            const cloudsContainer = document.getElementById('cloudsContainer');
            const cloudCount = 8;
            
            for (let i = 0; i < cloudCount; i++) {
                const cloud = document.createElement('div');
                cloud.classList.add('cloud');
                
                const cloudType = `cloud-${Math.floor(Math.random() * 3) + 1}`;
                cloud.classList.add(cloudType);
                
                const top = Math.random() * 60 + 10;
                const delay = Math.random() * 30;
                const duration = Math.random() * 40 + 30;
                
                cloud.style.top = top + '%';
                cloud.style.animation = `cloudMove ${duration}s linear ${delay}s infinite`;
                
                cloudsContainer.appendChild(cloud);
            }
        }

        function createPlanets() {
            const planetsContainer = document.getElementById('planetsContainer');
            const planetColors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#feca57', '#ff9ff3'];
            
            for (let i = 0; i < 6; i++) {
                const planet = document.createElement('div');
                planet.classList.add('planet');
                
                const left = Math.random() * 80 + 10;
                const top = Math.random() * 60 + 20;
                const size = Math.random() * 35 + 25;
                const color = planetColors[i];
                const delay = Math.random() * 3;
                
                planet.style.left = left + '%';
                planet.style.top = top + '%';
                planet.style.width = size + 'px';
                planet.style.height = size + 'px';
                planet.style.background = color;
                planet.style.animationDelay = delay + 's';
                planet.style.boxShadow = `0 0 30px ${color}`;
                
                planetsContainer.appendChild(planet);
            }
        }

        function openDiscord() {
            window.open('https://discord.com/users/860948173827997719', '_blank');
        }

        window.onload = function() {
            initTheme();
            createStars();
            createMeteors();
            createClouds();
            createPlanets();
            updateAge();
            updateTime(); // تشغيل الساعة
            initPlanetsInteraction();
            addClickSounds();
            
            // تحديث الساعة أول مرة فور التحميل
            updateTime();
        };
    </script>
</body>
